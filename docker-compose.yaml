services:
  # ===== KONG =====
  kong-db:
    image: postgres:16
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kong_net

  kong-migration:
    image: kong:3.7
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
    depends_on:
      kong-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - kong_net

  kong:
    build:
      context: ./kong
      dockerfile: Dockerfile
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PLUGINS: bundled,inject-user-id
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    networks:
      - kong_net
      - app_net

  konga:
    image: pantsel/konga:latest
    environment:
      NODE_ENV: production
      TOKEN_SECRET: ${KONGA_TOKEN_SECRET}
      KONGA_HOOK_TIMEOUT: 120000
    ports:
      - "1337:1337"
    depends_on:
      - kong
    networks:
      - kong_net

  # ===== APPS — SEM PORTS EXPOSTAS =====
  auth-api:
    build: ./ms-auth-api
    env_file:
      - ./ms-auth-api/.env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
    expose:
      - "3001"
    volumes:
      - auth_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  wallet-api:
    build: ./ms-wallet-api
    env_file:
      - ./ms-wallet-api/.env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
    expose:
      - "3002"
    volumes:
      - wallet_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  kong_data:
  auth_data:
  wallet_data:

networks:
  kong_net:
  app_net:
